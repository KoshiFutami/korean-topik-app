name: "🔧 雑務・設定 (chore)"
description: "依存関係の更新・設定変更・ドキュメント整備など、機能追加・バグ修正以外の作業を依頼する"
title: "chore: "
labels: ["chore"]
body:
  - type: markdown
    attributes:
      value: |
        ## Copilot への依頼フォーム — 雑務・設定

        「何をしたいか」と「なぜ必要か」を記入してください。

  - type: textarea
    id: summary
    attributes:
      label: "📝 作業概要"
      description: "何をしてほしいかを 1〜3 文で説明してください。"
      placeholder: "例: GitHub Actions のキャッシュキーを更新して CI の速度を改善したい。"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: "🗂 カテゴリ"
      options:
        - "依存関係の更新"
        - "CI / GitHub Actions"
        - "Docker / インフラ"
        - "ドキュメント・ADR"
        - "リファクタリング"
        - "その他"
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: "🔧 詳細・変更対象ファイル"
      description: "対象ファイルや具体的な変更内容が分かれば記載してください。"
      placeholder: |
        - .github/workflows/backend-tests.yml のキャッシュキーを composer.lock のハッシュに変更
        - docker-compose.yml の MySQL バージョンを 8.0 → 8.4 に上げる

  - type: textarea
    id: reason
    attributes:
      label: "💡 背景・理由"
      placeholder: "例: 毎回キャッシュが無効化されて CI に 5 分以上かかっているため。"
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: "✅ 完了条件（Done Criteria）"
      placeholder: |
        - [ ] `make test` が通る
        - [ ] CI が正常に完了する
