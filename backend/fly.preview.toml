# Fly.io configuration for PR preview environments.
# App name is set dynamically: fly deploy --app korean-topik-pr-{NUMBER}
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile.preview"

[env]
  APP_ENV      = "preview"
  APP_DEBUG    = "false"
  DB_CONNECTION = "mysql"
  DB_PORT      = "3306"
  LOG_CHANNEL  = "stderr"

[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 25
    hard_limit = 50

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
